<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Install App</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0a0a0a;color:#f5f5f5;
      min-height:100vh;display:flex;justify-content:center;align-items:center;
      padding:24px;
    }
    .card{
      background:#1a1a1a;border-radius:24px;padding:40px 32px;
      max-width:380px;width:100%;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .app-icon{
      width:80px;height:80px;
      background:linear-gradient(135deg,#4f8cff 0%,#2d5dd8 100%);
      border-radius:20px;margin:0 auto 20px;
      display:flex;align-items:center;justify-content:center;
      font-size:36px;font-weight:700;color:#fff;
    }
    h1{font-size:28px;font-weight:700;margin-bottom:4px}
    .subtitle{font-size:14px;color:#888;margin-bottom:28px;text-transform:uppercase;letter-spacing:1px}
    .qr-wrap{
      background:#fff;border-radius:16px;padding:16px;
      display:inline-block;margin-bottom:12px;
    }
    .qr-wrap canvas{display:block}
    .qr-label{font-size:12px;color:#666;margin-bottom:24px}
    .install-btn{
      display:block;background:#4f8cff;color:#fff;
      font-size:18px;font-weight:600;padding:16px 32px;
      border-radius:14px;text-decoration:none;margin-bottom:20px;
      transition:background .2s;
    }
    .install-btn:active{background:#3a6fd4}
    .cert-btn{
      display:none;background:transparent;color:#4f8cff;
      font-size:14px;font-weight:600;padding:10px 24px;
      border-radius:10px;text-decoration:none;margin-bottom:20px;
      border:1px solid #4f8cff;transition:background .2s,color .2s;
    }
    .cert-btn:active{background:#4f8cff;color:#fff}
    .note{font-size:12px;color:#666;line-height:1.6;margin-bottom:24px}
    .info{font-size:12px;color:#555;border-top:1px solid #2a2a2a;padding-top:16px}
    .info span{display:block;margin-bottom:4px}
    .info code{background:#222;padding:2px 6px;border-radius:4px;font-family:'SF Mono',Menlo,monospace;font-size:11px}
    .error{color:#f44;font-size:15px;margin:20px 0}
    .hidden{display:none}

    .versions-toggle{
      background:none;border:1px solid #333;color:#888;
      font-size:12px;padding:8px 16px;border-radius:8px;
      cursor:pointer;margin-top:12px;transition:all .2s;
    }
    .versions-toggle:hover{border-color:#555;color:#aaa}
    .versions-list{
      margin-top:16px;text-align:left;
      max-height:300px;overflow-y:auto;
      border-top:1px solid #2a2a2a;
    }
    .versions-list::-webkit-scrollbar{width:4px}
    .versions-list::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
    .version-item{
      display:flex;align-items:baseline;justify-content:space-between;
      padding:10px 8px;border-bottom:1px solid #222;
      cursor:pointer;transition:background .15s;text-decoration:none;color:inherit;
    }
    .version-item:hover{background:#222}
    .version-item.active{background:#1e2a3a}
    .version-left{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
    .version-ver{font-size:13px;font-weight:600;color:#f5f5f5}
    .version-msg{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .version-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:12px;flex-shrink:0}
    .version-hash{font-size:11px;color:#555;font-family:'SF Mono',Menlo,monospace}
    .version-date{font-size:10px;color:#444}
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon" id="icon">?</div>
    <h1 id="title">Loading&hellip;</h1>
    <p class="subtitle" id="subtitle"></p>

    <p class="error hidden" id="error"></p>

    <!-- QR code shown on desktop only -->
    <div class="hidden" id="qr-section">
      <div class="qr-wrap"><div id="qr"></div></div>
      <p class="qr-label">Scan with your iPhone to install directly</p>
    </div>

    <a class="install-btn hidden" id="install-btn" href="#">
      Install on iPhone
    </a>
    <a class="cert-btn" id="cert-btn" href="#">
      Register Device
    </a>

    <p class="note hidden" id="note">
      Your device must be registered in the provisioning profile.<br>
      Open this page on your iPhone, then tap Install.
    </p>

    <div class="info hidden" id="info"></div>

    <button class="versions-toggle hidden" id="versions-toggle">Show all versions</button>
    <div class="versions-list hidden" id="versions-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var app = params.get('app');
      var selectedVersion = params.get('version');

      if (!app) {
        document.getElementById('title').textContent = 'Ad-Hoc Install';
        document.getElementById('icon').textContent = '?';
        document.getElementById('error').textContent = 'Pass ?app=name in the URL.';
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('subtitle').textContent = '';
        return;
      }

      var base = location.href.split('?')[0].replace(/\/+$/, '');

      // Determine manifest URL based on whether a specific version is selected
      var manifestUrl;
      if (selectedVersion) {
        manifestUrl = base + '/apps/' + app + '/versions/' + selectedVersion + '/manifest.plist';
      } else {
        manifestUrl = base + '/apps/' + app + '/manifest.plist';
      }

      var installHref = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(manifestUrl);

      var btn = document.getElementById('install-btn');
      btn.href = installHref;
      btn.classList.remove('hidden');
      document.getElementById('note').classList.remove('hidden');

      // QR code on non-iOS devices
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      if (!isIOS && typeof qrcode !== 'undefined') {
        var qrSection = document.getElementById('qr-section');
        qrSection.classList.remove('hidden');
        var qr = qrcode(0, 'L');
        qr.addData(installHref);
        qr.make();
        document.getElementById('qr').innerHTML = qr.createSvgTag(5, 0);
      }

      // Load app info
      fetch(base + '/apps/' + app + '/info.json')
        .then(function (r) { return r.json(); })
        .then(function (info) {
          var displayVersion = selectedVersion || info.version;
          var isLatest = !selectedVersion || selectedVersion === info.version;

          document.getElementById('title').textContent = info.title || app;
          document.getElementById('icon').textContent = (info.title || app).charAt(0).toUpperCase();
          document.getElementById('subtitle').textContent =
            'v' + displayVersion + (isLatest ? ' \u2014 Latest' : '');
          document.title = 'Install ' + (info.title || app);

          // Show register device button if configured
          if (info.registerDeviceUrl) {
            var certBtn = document.getElementById('cert-btn');
            certBtn.href = info.registerDeviceUrl;
            certBtn.style.display = 'block';
          }

          // If a specific version is selected, try to find its details from versions.json
          if (selectedVersion && selectedVersion !== info.version) {
            loadVersionDetails(base, app, selectedVersion, info.title || app);
          } else {
            var infoEl = document.getElementById('info');
            infoEl.classList.remove('hidden');
            infoEl.innerHTML =
              '<span>Commit: <code>' + (info.commit || '?') + '</code></span>' +
              (info.message ? '<span>Message: <code>' + escapeHtml(info.message) + '</code></span>' : '') +
              '<span>Built: <code>' + (info.date || '?') + '</code></span>';
          }
        })
        .catch(function () {
          document.getElementById('title').textContent = app;
          document.getElementById('icon').textContent = app.charAt(0).toUpperCase();
          document.getElementById('subtitle').textContent = selectedVersion ? 'v' + selectedVersion : 'Preview Build';
        });

      // Load versions list
      fetch(base + '/apps/' + app + '/versions.json')
        .then(function (r) { return r.json(); })
        .then(function (versions) {
          if (!versions || versions.length === 0) return;

          var toggleBtn = document.getElementById('versions-toggle');
          var listEl = document.getElementById('versions-list');
          toggleBtn.classList.remove('hidden');
          toggleBtn.textContent = 'Show all versions (' + versions.length + ')';

          toggleBtn.addEventListener('click', function () {
            var showing = !listEl.classList.contains('hidden');
            listEl.classList.toggle('hidden');
            toggleBtn.textContent = showing
              ? 'Show all versions (' + versions.length + ')'
              : 'Hide versions';
          });

          var latestVersion = versions[0] ? versions[0].version : null;

          versions.forEach(function (v) {
            var a = document.createElement('a');
            var isActive = selectedVersion
              ? v.version === selectedVersion
              : v.version === latestVersion;

            // Build the URL for this version
            var versionUrl = '?app=' + app + '&version=' + v.version;
            a.href = versionUrl;
            a.className = 'version-item' + (isActive ? ' active' : '');

            var isLatestVer = v.version === latestVersion;
            var label = 'v' + v.version + (isLatestVer ? ' (latest)' : '');

            a.innerHTML =
              '<div class="version-left">' +
                '<span class="version-ver">' + escapeHtml(label) + '</span>' +
                '<span class="version-msg">' + escapeHtml(v.message || '') + '</span>' +
              '</div>' +
              '<div class="version-right">' +
                '<span class="version-hash">' + escapeHtml((v.commit || '').substring(0, 6)) + '</span>' +
                '<span class="version-date">' + escapeHtml(v.date || '') + '</span>' +
              '</div>';

            listEl.appendChild(a);
          });
        })
        .catch(function () { /* no versions.json yet, hide toggle */ });

      function loadVersionDetails(base, app, version, title) {
        fetch(base + '/apps/' + app + '/versions.json')
          .then(function (r) { return r.json(); })
          .then(function (versions) {
            var found = versions.find(function (v) { return v.version === version; });
            var infoEl = document.getElementById('info');
            infoEl.classList.remove('hidden');
            if (found) {
              document.getElementById('subtitle').textContent = 'v' + version;
              infoEl.innerHTML =
                '<span>Commit: <code>' + escapeHtml(found.commit || '?') + '</code></span>' +
                (found.message ? '<span>Message: <code>' + escapeHtml(found.message) + '</code></span>' : '') +
                '<span>Built: <code>' + escapeHtml(found.date || '?') + '</code></span>';
            } else {
              infoEl.innerHTML = '<span>Version <code>' + escapeHtml(version) + '</code> not found</span>';
            }
          })
          .catch(function () {});
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
