<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Install App</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0a0a0a;color:#f5f5f5;
      min-height:100vh;display:flex;justify-content:center;align-items:center;
      padding:24px;
    }
    .card{
      background:#1a1a1a;border-radius:24px;padding:40px 32px;
      max-width:380px;width:100%;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .app-icon{
      width:80px;height:80px;
      background:linear-gradient(135deg,#4f8cff 0%,#2d5dd8 100%);
      border-radius:20px;margin:0 auto 20px;
      display:flex;align-items:center;justify-content:center;
      font-size:36px;font-weight:700;color:#fff;
    }
    h1{font-size:28px;font-weight:700;margin-bottom:4px}
    .subtitle{font-size:14px;color:#888;margin-bottom:28px;text-transform:uppercase;letter-spacing:1px}
    .qr-wrap{
      background:#fff;border-radius:16px;padding:16px;
      display:inline-block;margin-bottom:12px;
    }
    .qr-wrap canvas{display:block}
    .qr-label{font-size:12px;color:#666;margin-bottom:24px}
    .install-btn{
      display:block;background:#4f8cff;color:#fff;
      font-size:18px;font-weight:600;padding:16px 32px;
      border-radius:14px;text-decoration:none;margin-bottom:20px;
      transition:background .2s;
    }
    .install-btn:active{background:#3a6fd4}
    .note{font-size:12px;color:#666;line-height:1.6;margin-bottom:24px}
    .info{font-size:12px;color:#555;border-top:1px solid #2a2a2a;padding-top:16px}
    .info span{display:block;margin-bottom:4px}
    .info code{background:#222;padding:2px 6px;border-radius:4px;font-family:'SF Mono',Menlo,monospace;font-size:11px}
    .error{color:#f44;font-size:15px;margin:20px 0}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon" id="icon">?</div>
    <h1 id="title">Loading&hellip;</h1>
    <p class="subtitle" id="subtitle"></p>

    <p class="error hidden" id="error"></p>

    <!-- QR code shown on desktop only -->
    <div class="hidden" id="qr-section">
      <div class="qr-wrap"><canvas id="qr"></canvas></div>
      <p class="qr-label">Scan with your iPhone to install directly</p>
    </div>

    <a class="install-btn hidden" id="install-btn" href="#">
      Install on iPhone
    </a>

    <p class="note hidden" id="note">
      Your device must be registered in the provisioning profile.<br>
      Open this page on your iPhone, then tap Install.
    </p>

    <div class="info hidden" id="info"></div>
  </div>

  <script>
    // Minimal QR Code generator (QR Model 2, byte mode, ECC-L)
    // Based on https://github.com/niclas/qrgen — public domain, inlined for zero deps
    var QR=function(){function t(t,e){for(var n=1<=0;)r^=t<<(n-a);return r}function o(t){for(var n=[],r=0;rt.length&&(e=t.length);for(var n=new Array(e),r=t.length-1;r>=0;r--)n[r]=t[r];return n}function s(t,r,a){for(var o=e(a),i=new Array(a),l=0;l>u&1)!=0}function c(t,e,n){for(var r=t.length,a=0;a=0&&l=0&&l>1&1)!=0)switch(r%3){case 0:a=!(a^o^i);break;case 1:a=!(a^l);break;case 2:a=!(a^o)}else switch(r%3){case 0:a=!((l+i)%2!=0||!(o^i));break;case 1:a=!((l*i)%2!=0||(l*i)%3!=0);break;case 2:a=!(((l+i)%2+(l*i)%3)%2!=0)}!n&&a&&(t[l][o]=!t[l][o])}}function p(t){for(var e=0,n=0;n=0;l--)i[l]=255&o,o>>=8;for(l=0;l=0;){for(var l=0,o=0;o>>7-a%8&1)!=0),a++}for(r=0;r7&&f(g,v,!0),h(g,v),c(g,v,n),d(g,n,!0);for(var b=0,y=0,j=0;j<8;j++){h(g,j);var w=p(g);(0==j||w0?(l=4,o+=(a=s(i.length,e,10)).length+10):i.length>0&&(l=8,o+=(a=s(i.length,e,8)).length+16);for(var u=0;u>=1;o+=d}var h=[236,17];for(u=0;o<8*c[e]-r;u++)a.push(h[u%2]),o+=8;return a}var g=[null,[[10,7,17,13],[1,1,1,1],[1,1,1,1]],[[16,10,28,22],[1,1,1,1],[1,1,1,1]],[[26,15,22,18],[1,1,2,2],[1,1,2,2]],[[18,20,16,26],[2,1,4,2],[2,1,4,2]],[[24,26,22,18],[2,1,4,4],[2,2,2,4]],[[16,18,28,24],[4,2,4,4],[2,2,4,4]],[[18,20,26,18],[4,2,5,6],[2,4,4,6]],[[22,24,26,22],[4,2,6,6],[2,4,4,8]],[[22,30,24,20],[5,2,8,8],[2,6,4,8]],[[26,18,28,24],[5,4,8,11],[4,4,6,8]],[[30,20,24,28],[5,4,11,8],[2,6,4,12]],[[22,24,28,26],[8,4,11,10],[4,4,8,10]],[[22,26,22,24],[9,4,16,12],[4,8,4,14]],[[24,30,24,20],[9,4,16,14],[4,8,8,10]],[[24,22,24,30],[10,6,18,14],[6,8,8,10]],[[28,24,30,24],[10,6,16,14],[6,8,10,10]],[[28,28,28,28],[11,6,19,14],[6,10,10,10]],[[26,30,28,24],[13,6,21,16],[8,10,10,12]],[[26,28,26,30],[14,7,25,18],[8,10,14,10]],[[26,28,28,30],[16,8,25,20],[10,10,14,12]],[[26,28,30,30],[17,8,25,24],[10,12,14,12]],[[28,28,24,30],[17,9,34,18],[12,10,16,14]],[[28,30,30,30],[18,9,30,24],[12,12,16,14]],[[28,30,30,30],[20,10,32,26],[12,14,16,14]],[[28,26,30,30],[21,12,35,28],[14,14,16,16]],[[28,28,30,28],[23,12,37,32],[14,14,18,16]],[[28,30,30,30],[25,12,40     (function () {
      var params = new URLSearchParams(location.search);
      var app = params.get('app');

      if (!app) {
        document.getElementById('title').textContent = 'Ad-Hoc Install';
        document.getElementById('icon').textContent = '?';
        document.getElementById('error').textContent = 'Pass ?app=name in the URL.';
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('subtitle').textContent = '';
        return;
      }

      var base = location.href.split('?')[0].replace(/\/+$/, '');
      var manifestUrl = base + '/apps/' + app + '/manifest.plist';
      var installHref = 'itms-services://?action=download-manifest&url=' + encodeURIComponent(manifestUrl);

      var btn = document.getElementById('install-btn');
      btn.href = installHref;
      btn.classList.remove('hidden');
      document.getElementById('note').classList.remove('hidden');

      // Show QR code on non-iOS devices (desktop) so user can scan with phone
      // Encodes the itms-services:// URL so scanning triggers install directly
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
      if (!isIOS) {
        var qrSection = document.getElementById('qr-section');
        qrSection.classList.remove('hidden');
        var result = QR.generate(installHref, 0); // 0 = ECC-L
        var modules = result.modules;
        var size = modules.length;
        var scale = Math.max(4, Math.floor(200 / size));
        var canvas = document.getElementById('qr');
        canvas.width = canvas.height = size * scale;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000';
        for (var y = 0; y < size; y++)
          for (var x = 0; x < size; x++)
            if (modules[y][x])
              ctx.fillRect(x * scale, y * scale, scale, scale);
      }

      fetch(base + '/apps/' + app + '/info.json')
        .then(function (r) { return r.json(); })
        .then(function (info) {
          document.getElementById('title').textContent = info.title || app;
          document.getElementById('icon').textContent = (info.title || app).charAt(0).toUpperCase();
          document.getElementById('subtitle').textContent =
            'v' + (info.version || '?') + ' \u2014 Preview';
          document.title = 'Install ' + (info.title || app);

          var infoEl = document.getElementById('info');
          infoEl.classList.remove('hidden');
          infoEl.innerHTML =
            '<span>Commit: <code>' + (info.commit || '?') + '</code></span>' +
            '<span>Built: <code>' + (info.date || '?') + '</code></span>';
        })
        .catch(function () {
          document.getElementById('title').textContent = app;
          document.getElementById('icon').textContent = app.charAt(0).toUpperCase();
          document.getElementById('subtitle').textContent = 'Preview Build';
        });
    })();
  </script>
</body>
</html>
